# stationary_slam_params.yaml
slam_toolbox:
  ros__parameters:
    # Frames
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    
    # SLAM parameters tuned for stationary/little movement
    use_scan_matching: true
    use_odometry: false
    use_imu_data: false
    
    # Matching parameters
    minimum_time_interval: 0.5
    transform_timeout: 0.5
    minimum_travel_distance: 0.01  # Small movements trigger updates
    minimum_travel_heading: 0.01   # Small rotations trigger updates
    
    # Map parameters
    resolution: 0.05
    max_laser_range: 12.0
    max_laser_range_stddev: 0.1
    
    # Loop closure
    do_loop_closing: true
    loop_closure_min_chain_size: 5
    loop_closure_max_distance: 1.0
    
    # Graph optimization
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_loss_function: HuberLoss
    ceres_loss_function_scale: 1.0
    
    # Debug
    debug_logging: true